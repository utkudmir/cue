name: verify-rc

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches:
      - main
    paths:
      - .github/workflows/verify-rc.yml
      - Makefile
      - build.gradle.kts
      - settings.gradle.kts
      - gradle.properties
      - gradle/**
      - ci/**
      - scripts/**
      - shared/**
      - androidApp/**
      - iosApp/**
      - docs/release-gate.md
      - docs/appstore-review-checklist.md
  push:
    branches:
      - main
    paths:
      - .github/workflows/verify-rc.yml
      - Makefile
      - build.gradle.kts
      - settings.gradle.kts
      - gradle.properties
      - gradle/**
      - ci/**
      - scripts/**
      - shared/**
      - androidApp/**
      - iosApp/**
      - docs/release-gate.md
      - docs/appstore-review-checklist.md
  schedule:
    - cron: "0 3 * * 1-5"
  workflow_dispatch:
    inputs:
      verify_profile:
        description: Device pool profile to run
        required: false
        type: choice
        default: ci-pr
        options:
          - ci-pr
          - ci-nightly
          - rc-full

concurrency:
  group: verify-rc-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'schedule' }}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  schedule-gate:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-24.04
    outputs:
      enabled: ${{ steps.schedule_gate.outputs.enabled }}
      verify_profile: ${{ steps.schedule_gate.outputs.verify_profile }}
      android_matrix: ${{ steps.schedule_gate.outputs.android_matrix }}
      ios_matrix: ${{ steps.schedule_gate.outputs.ios_matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Schedule gate precheck
        id: schedule_gate
        shell: bash
        run: |
          set -euo pipefail
          echo "== verify-rc precheck =="
          echo "event: ${{ github.event_name }}"
          echo "ref: ${{ github.ref }}"
          echo "sha: ${{ github.sha }}"
          echo "schedule gate variable ENABLE_RC_FULL_SCHEDULE='${{ vars.ENABLE_RC_FULL_SCHEDULE }}'"

          effective_profile="ci-pr"
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            effective_profile="ci-nightly"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.verify_profile }}" ]]; then
            effective_profile="${{ github.event.inputs.verify_profile }}"
          fi

          echo "requested profile: $effective_profile"
          echo "verify_profile=$effective_profile" >> "$GITHUB_OUTPUT"

          if [[ "${{ github.event_name }}" == "schedule" && "${{ vars.ENABLE_RC_FULL_SCHEDULE }}" != "true" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Skipping scheduled verify run: ENABLE_RC_FULL_SCHEDULE is not 'true'."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

          android_matrix="$(ruby scripts/device-pool-matrix.rb "$effective_profile" android)"
          ios_matrix="$(ruby scripts/device-pool-matrix.rb "$effective_profile" ios)"

          echo "android matrix: $android_matrix"
          echo "ios matrix: $ios_matrix"

          echo "android_matrix=$android_matrix" >> "$GITHUB_OUTPUT"
          echo "ios_matrix=$ios_matrix" >> "$GITHUB_OUTPUT"

  verify-shared:
    needs: schedule-gate
    if: needs['schedule-gate'].outputs.enabled == 'true'
    runs-on: macos-15
    timeout-minutes: 90
    env:
      VERIFY_PROFILE: ${{ needs['schedule-gate'].outputs.verify_profile }}
      STEP_COMMAND_TIMEOUT_SECONDS: "1800"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Workflow context
        shell: bash
        run: |
          set -euo pipefail
          echo "== verify-shared workflow context =="
          echo "runner: $RUNNER_NAME"
          echo "runner os: $RUNNER_OS"
          echo "runner arch: $RUNNER_ARCH"
          echo "workspace: $GITHUB_WORKSPACE"
          echo "profile: $VERIFY_PROFILE"
          echo "repository: $GITHUB_REPOSITORY"
          echo "run id: $GITHUB_RUN_ID"
          echo "run attempt: $GITHUB_RUN_ATTEMPT"
          echo "actor: $GITHUB_ACTOR"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Verify Shared
        shell: bash
        env:
          VERIFY_RC_SCOPE: shared
        run: |
          set -euo pipefail
          echo "== verify shared scope =="
          echo "profile: $VERIFY_PROFILE"
          make verify-rc

      - name: Upload RC artifacts (shared)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rc-verify-shared-artifacts
          path: build/rc-verify/
          retention-days: 7
          if-no-files-found: ignore

  verify-android-build:
    needs: schedule-gate
    if: needs['schedule-gate'].outputs.enabled == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      VERIFY_PROFILE: ${{ needs['schedule-gate'].outputs.verify_profile }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Workflow context
        shell: bash
        run: |
          set -euo pipefail
          echo "== verify-android-build workflow context =="
          echo "runner: $RUNNER_NAME"
          echo "runner os: $RUNNER_OS"
          echo "runner arch: $RUNNER_ARCH"
          echo "workspace: $GITHUB_WORKSPACE"
          echo "profile: $VERIFY_PROFILE"
          echo "repository: $GITHUB_REPOSITORY"
          echo "run id: $GITHUB_RUN_ID"
          echo "run attempt: $GITHUB_RUN_ATTEMPT"
          echo "actor: $GITHUB_ACTOR"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Verify Android build and unit scope
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew :androidApp:lint :androidApp:testDebugUnitTest :androidApp:assembleDebug

      - name: Upload Android debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: androidApp/build/outputs/apk/debug/androidApp-debug.apk
          retention-days: 7
          if-no-files-found: error

      - name: Upload Android build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-reports
          path: |
            androidApp/build/reports/
            build/reports/
          retention-days: 7
          if-no-files-found: ignore

  verify-android-device:
    needs:
      - schedule-gate
      - verify-android-build
    if: needs['schedule-gate'].outputs.enabled == 'true'
    runs-on: ${{ vars.ANDROID_EMULATOR_RUNNER != '' && vars.ANDROID_EMULATOR_RUNNER || 'ubuntu-24.04' }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs['schedule-gate'].outputs.android_matrix) }}
    env:
      VERIFY_PROFILE: ${{ needs['schedule-gate'].outputs.verify_profile }}
      ANDROID_APK_PATH: ${{ github.workspace }}/build/android-artifacts/androidApp-debug.apk
      ANDROID_PACKAGE: app.debridhub
      ANDROID_VERIFY_LOG_DIR: ${{ github.workspace }}/build/rc-verify/android/${{ matrix.slug }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Workflow context
        shell: bash
        run: |
          set -euo pipefail
          echo "== verify-android-device workflow context =="
          echo "runner: $RUNNER_NAME"
          echo "runner os: $RUNNER_OS"
          echo "runner arch: $RUNNER_ARCH"
          echo "workspace: $GITHUB_WORKSPACE"
          echo "profile: $VERIFY_PROFILE"
          echo "device label: ${{ matrix.label }}"
          echo "api level: ${{ matrix.api_level }}"
          echo "target: ${{ matrix.target }}"
          echo "arch: ${{ matrix.arch }}"
          echo "avd name: ${{ matrix.avd_name }}"

      - name: Enable KVM group perms
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -e /dev/kvm ]]; then
            echo "/dev/kvm is not available on this runner; Android Emulator will fall back to software virtualization."
            exit 0
          fi
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Download Android debug APK
        uses: actions/download-artifact@v4
        with:
          name: android-debug-apk
          path: build/android-artifacts

      - name: Cache Android AVD snapshot
        id: avd-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ runner.os }}-${{ matrix.api_level }}-${{ matrix.target }}-${{ matrix.arch }}-${{ matrix.avd_name }}-v1

      - name: Create Android AVD snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api_level }}
          target: ${{ matrix.target }}
          arch: ${{ matrix.arch }}
          profile: ${{ matrix.device_profile }}
          avd-name: ${{ matrix.avd_name }}
          force-avd-creation: false
          disable-linux-hw-accel: auto
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "Generated cached AVD snapshot for ${{ matrix.label }}"

      - name: Verify Android emulator smoke
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api_level }}
          target: ${{ matrix.target }}
          arch: ${{ matrix.arch }}
          profile: ${{ matrix.device_profile }}
          avd-name: ${{ matrix.avd_name }}
          force-avd-creation: false
          disable-linux-hw-accel: auto
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: ./scripts/verify-android-emulator.sh "$ANDROID_APK_PATH" "$ANDROID_PACKAGE"

      - name: Upload RC artifacts (android-${{ matrix.slug }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rc-verify-android-${{ matrix.slug }}
          path: build/rc-verify/android/${{ matrix.slug }}/
          retention-days: 7
          if-no-files-found: ignore

  verify-ios:
    needs: schedule-gate
    if: needs['schedule-gate'].outputs.enabled == 'true'
    runs-on: macos-15
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs['schedule-gate'].outputs.ios_matrix) }}
    env:
      VERIFY_PROFILE: ${{ needs['schedule-gate'].outputs.verify_profile }}
      STEP_COMMAND_TIMEOUT_SECONDS: "1800"
      VERIFY_RC_IOS_LABELS: ${{ matrix.label }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Workflow context
        shell: bash
        run: |
          set -euo pipefail
          echo "== verify-ios workflow context =="
          echo "runner: $RUNNER_NAME"
          echo "runner os: $RUNNER_OS"
          echo "runner arch: $RUNNER_ARCH"
          echo "workspace: $GITHUB_WORKSPACE"
          echo "profile: $VERIFY_PROFILE"
          echo "ios label: ${{ matrix.label }}"
          echo "device class: ${{ matrix.device_class }}"
          echo "repository: $GITHUB_REPOSITORY"
          echo "run id: $GITHUB_RUN_ID"
          echo "run attempt: $GITHUB_RUN_ATTEMPT"
          echo "actor: $GITHUB_ACTOR"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Verify iOS
        shell: bash
        env:
          VERIFY_RC_SCOPE: ios
        run: |
          set -euo pipefail
          echo "== verify ios scope =="
          echo "profile: $VERIFY_PROFILE"
          echo "label filter: $VERIFY_RC_IOS_LABELS"
          make verify-rc

      - name: Upload RC artifacts (ios-${{ matrix.slug }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rc-verify-ios-${{ matrix.slug }}
          path: build/rc-verify/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload CI logs (ios-${{ matrix.slug }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs-ios-${{ matrix.slug }}
          path: build/ci-logs/
          retention-days: 7
          if-no-files-found: ignore

  verify-gate:
    needs:
      - schedule-gate
      - verify-shared
      - verify-android-build
      - verify-android-device
      - verify-ios
    if: always() && needs['schedule-gate'].outputs.enabled == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      VERIFY_PROFILE: ${{ needs['schedule-gate'].outputs.verify_profile }}
      STEP_COMMAND_TIMEOUT_SECONDS: "1800"
    steps:
      - name: Validate required platform jobs
        shell: bash
        run: |
          set -euo pipefail
          echo "verify-shared result: ${{ needs['verify-shared'].result }}"
          echo "verify-android-build result: ${{ needs['verify-android-build'].result }}"
          echo "verify-android-device result: ${{ needs['verify-android-device'].result }}"
          echo "verify-ios result: ${{ needs['verify-ios'].result }}"
          if [[ "${{ needs['verify-shared'].result }}" != "success" ]]; then
            echo "verify-shared did not succeed" >&2
            exit 1
          fi
          if [[ "${{ needs['verify-android-build'].result }}" != "success" ]]; then
            echo "verify-android-build did not succeed" >&2
            exit 1
          fi
          if [[ "${{ needs['verify-android-device'].result }}" != "success" ]]; then
            echo "verify-android-device did not succeed" >&2
            exit 1
          fi
          if [[ "${{ needs['verify-ios'].result }}" != "success" ]]; then
            echo "verify-ios did not succeed" >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Workflow context
        shell: bash
        run: |
          set -euo pipefail
          echo "== verify-gate workflow context =="
          echo "runner: $RUNNER_NAME"
          echo "runner os: $RUNNER_OS"
          echo "runner arch: $RUNNER_ARCH"
          echo "workspace: $GITHUB_WORKSPACE"
          echo "profile: $VERIFY_PROFILE"
          echo "repository: $GITHUB_REPOSITORY"
          echo "run id: $GITHUB_RUN_ID"
          echo "run attempt: $GITHUB_RUN_ATTEMPT"
          echo "actor: $GITHUB_ACTOR"

      - name: Verify Gate
        shell: bash
        env:
          VERIFY_RC_SCOPE: gate
        run: |
          set -euo pipefail
          echo "== verify gate scope =="
          echo "profile: $VERIFY_PROFILE"
          make verify-rc

      - name: Upload RC artifacts (gate)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rc-verify-gate-artifacts
          path: build/rc-verify/
          retention-days: 7
          if-no-files-found: ignore
