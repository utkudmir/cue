name: dependabot-triage

on:
  workflow_dispatch:
  schedule:
    - cron: "30 5 * * 1"

permissions:
  contents: read
  pull-requests: write

jobs:
  triage:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Dependabot triage automation
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: scripts/dependabot-triage.sh utkudmir/debrid-hub
