name: DebridHubHost
options:
  deploymentTarget:
    iOS: "18.0"
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: app.debridhub.ios
    PRODUCT_NAME: DebridHub
    SWIFT_VERSION: "5.10"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    FRAMEWORK_SEARCH_PATHS:
      - $(inherited)
      - $(SRCROOT)/../shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)
    LD_RUNPATH_SEARCH_PATHS:
      - $(inherited)
      - "@executable_path/Frameworks"
targets:
  DebridHubHost:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: DebridHubHost
        excludes:
          - Info.plist
    settings:
      base:
        INFOPLIST_FILE: DebridHubHost/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
    preBuildScripts:
      - name: Build Shared Framework
        basedOnDependencyAnalysis: true
        outputFiles:
          - $(SRCROOT)/../shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)/Shared.framework/Shared
        script: |
          set -euo pipefail
          REPO_ROOT="$SRCROOT/.."
          if [[ -z "${JAVA_HOME:-}" || ! -x "$JAVA_HOME/bin/java" ]]; then
            export JAVA_HOME="$("/usr/libexec/java_home" -v 21 2>/dev/null)"
          fi
          cd "$REPO_ROOT"
          ./gradlew :shared:embedAndSignAppleFrameworkForXcode
    dependencies:
      - framework: ../shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)/Shared.framework
        embed: true
  DebridHubHostTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: DebridHubHostTests
    dependencies:
      - target: DebridHubHost
      - framework: ../shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)/Shared.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.debridhub.ios.tests
        PRODUCT_NAME: DebridHubHostTests
        SWIFT_MODULE_NAME: DebridHubHostTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/DebridHub.app/DebridHub"
        BUNDLE_LOADER: "$(TEST_HOST)"
schemes:
  DebridHubHost:
    build:
      targets:
        DebridHubHost: all
        DebridHubHostTests: [test]
    test:
      gatherCoverageData: false
      targets:
        - name: DebridHubHostTests
    run:
      config: Debug
