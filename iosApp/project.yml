name: CueHost
options:
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.utkudemir.cue
    PRODUCT_NAME: Cue
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    SWIFT_VERSION: "5.10"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    FRAMEWORK_SEARCH_PATHS:
      - $(inherited)
      - $(SRCROOT)/../shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)
    LD_RUNPATH_SEARCH_PATHS:
      - $(inherited)
      - "@executable_path/Frameworks"
targets:
  CueHost:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: CueHost
        excludes:
          - Info.plist
    settings:
      base:
        INFOPLIST_FILE: CueHost/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
    preBuildScripts:
      - name: Build Shared Framework
        basedOnDependencyAnalysis: true
        outputFiles:
          - $(SRCROOT)/../shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)/Shared.framework/Shared
        script: |
          set -euo pipefail
          REPO_ROOT="$SRCROOT/.."
          if [[ -z "${JAVA_HOME:-}" || ! -x "$JAVA_HOME/bin/java" ]]; then
            export JAVA_HOME="$("/usr/libexec/java_home" -v 21 2>/dev/null)"
          fi
          cd "$REPO_ROOT"
          ./gradlew :shared:embedAndSignAppleFrameworkForXcode
    dependencies:
      - framework: ../shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)/Shared.framework
        embed: true
  CueHostTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: CueHostTests
    dependencies:
      - target: CueHost
      - framework: ../shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)/Shared.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.utkudemir.cue.tests
        PRODUCT_NAME: CueHostTests
        SWIFT_MODULE_NAME: CueHostTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Cue.app/Cue"
        BUNDLE_LOADER: "$(TEST_HOST)"
schemes:
  CueHost:
    build:
      targets:
        CueHost: all
        CueHostTests: [test]
    test:
      gatherCoverageData: false
      targets:
        - name: CueHostTests
    run:
      config: Debug
